name: Moonlight
options:
  bundleIdPrefix: com.damla
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

targets:
  Moonlight:
    type: application
    platform: iOS
    sources:
      - path: Moonlight
    info:
      path: Moonlight/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "Moonlight needs your location to show accurate moon phase and astrology data for where you are."
        CFBundleDisplayName: Moonlight
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.damla.moonlight
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Moonlight/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Moonlight needs your location to show accurate moon phase and astrology data for where you are."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
